random_seed: 42
recording_cap: 20          # 20 / 50 / 100 for sensitivity
min_duration_s: 5.0
syllable_min_ms: 50
syllable_max_ms: 2000
boundary_pad_ms: 10
segmentation_mao_threshold_ms: 20.0
mao_reference: "powdermill"
hdbscan_min_cluster_size_grid: [5, 10, 15, 20, 25, 30, 40]
hdbscan_min_samples_grid: [3, 5, 8, 12]
hdbscan_max_cycles: 10
bootstrap_n: 1000
bootstrap_stability_ari_threshold: 0.70
cross_recordist_ari_threshold: 0.50
birdaves_cosine_threshold: 0.60
spectral_cv_flag_threshold: 0.40
spectral_cv_flagged_fraction_threshold: 0.10
zebrafinch_f1_threshold: 0.60
mismatch_percentiles: [50, 75, 95]
primary_mismatch_percentile: 95
gap_open_grid: [-1.0, -2.0, -3.0]
gap_extend_grid: [-0.25, -0.5, -1.0]
null_model_permutations: 999
null_model_upper_tail: 0.975
null_model_binomial_alpha: 0.05
recording_bootstrap_n: 500
mrm_permutations: 9999
mantel_permutations: 9999
bonferroni_alpha: 0.0167
h1_biological_threshold_semipartial_r2: 0.10
h2_biological_threshold_spearman_rho: 0.50
h3_biological_threshold_mantel_r: 0.20
cell_size_degrees: 0.5
min_recordings_per_cell: 5
min_cells_for_inference: 6
use_temporal_features: false
breeding_window_palearctic: [4, 7]
breeding_window_asian: [5, 8]
xeno_canto_base_url: "https://xeno-canto.org/api/2/recordings"
data_dir: "data"
output_dir: "outputs"

# Xeno-canto query parameters
xc_query_genus: "gen:Phylloscopus type:song q:A"
xc_query_within_species: "Phylloscopus trochilus cnt:United+Kingdom type:song q:A"
xc_within_species_lat_min: 49.9
xc_within_species_lat_max: 60.9
xc_within_species_lon_min: -8.6
xc_within_species_lon_max: 1.8

# API rate limiting
api_backoff_start_s: 1.0
api_backoff_max_s: 60.0

# MFCC parameters
n_mfcc: 13
frame_length_ms: 25
hop_length_ms: 10
spectral_rolloff_threshold: 0.85
mfcc_feature_dim: 30
pitch_amplitude_dim: 6
# Preregistered feature aggregation — see RR §2.9.1.
# mean: 13 MFCC means + 13 delta means + 4 spectral means = 30 dims (consistent with stated 30/36 counts).
# mean_sd: would yield ≠30 dims and requires updating all downstream dimension constants — NOT the RR default.
cepstral_aggregation: "mean"

# Temporal mode MFCC
temporal_n_frames: 50

# Gap penalty held-out set size
gap_penalty_holdout_n_species: 10

# Tree reconstruction
rf_null_permutations: 999

# Power simulation
power_n_species_grid: [10, 15, 20, 25, 30, 35, 40, 50, 60]
power_true_r_grid: [0.10, 0.15, 0.20, 0.25, 0.30, 0.40]
power_n_simulations: 1000
power_h2_fixed_n_regions: 7

# H2 BBS regions
bbs_regions:
  - "Scotland"
  - "Wales"
  - "Northern Ireland"
  - "England-SE"
  - "England-SW"
  - "England-Midlands"
  - "England-N"

bbs_scotland_lat_threshold: 55.0
